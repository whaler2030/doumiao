name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build debug APK
        shell: bash
        run: |
          set +e
          gradle assembleDebug --stacktrace 2>&1 | tee gradle-build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message=$(tail -200 gradle-build.log)
            message=${message//'%'/'%25'}
            message=${message//$'\n'/'%0A'}
            message=${message//$'\r'/'%0D'}
            echo "::error title=Gradle build failed::$message"
            exit "$status"
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: gradle-build.log
          if-no-files-found: ignore

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: contract-scanner-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
